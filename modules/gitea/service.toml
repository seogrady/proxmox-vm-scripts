name = "gitea"
version = "1.0.0"
scope = "resource"
targets = ["lxc", "vm"]

[runtime]
requirements = ["http", "ssh"]
services = ["gitea"]

[settings]
default_target = "lxc"
fallback_target = "vm"
http_port = 3000
ssh_port = 2222

[ui]
enabled = true
port = 3000
path = "/"
name = "Gitea"
description = "Self-hosted Git service"
