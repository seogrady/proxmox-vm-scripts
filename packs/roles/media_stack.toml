name = "media_stack"
kind = "vm"

[defaults]
requires = ["docker"]

[features.media_services]
enabled = true
minimal = true
services = [
  "gluetun",
  "jellyfin",
  "sonarr",
  "radarr",
  "prowlarr",
  "qbittorrent-vpn",
  "jellyseerr",
  "bazarr",
  "homarr",
  "jellystat-db",
  "jellystat",
]

[features.storage]
media_path = "/media"

[features.vpn]
enabled = false
provider = "mullvad"
type = "wireguard"

[render]
templates = ["docker-compose.media.hbs", "media.env.hbs", "tailscale-setup.sh.hbs"]

[scripts]
bootstrap = ["bootstrap-node.sh", "bootstrap-tailscale.sh", "bootstrap-media.sh", "bootstrap-jellyfin.sh", "bootstrap-qbittorrent.sh", "bootstrap-arr.sh"]
