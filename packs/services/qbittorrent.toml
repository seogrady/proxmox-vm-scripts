name = "qbittorrent"
container_type = "docker"

[image]
name = "lscr.io/linuxserver/qbittorrent"
tag = "latest"

[ports]
published = ["8080:8080", "6881:6881", "6881:6881/udp"]

[volumes]
mounts = ["${STORAGE_PATH}:/data", "${CONFIG_PATH}/qbittorrent:/config"]

[ui]
enabled = true
port = 8080
path = "/"
name = "qBittorrent"
description = "Torrent client"
