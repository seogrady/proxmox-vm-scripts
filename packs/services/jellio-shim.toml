name = "jellio-shim"
container_type = "docker"

[image]
name = "python"
tag = "3.13-alpine"

[settings]
command = "python3 /app/jellio-shim.py"

[volumes]
mounts = ["${CONFIG_PATH}/jellio-shim:/app:ro"]

[environment]
JELLIO_SHIM_LISTEN = "0.0.0.0:8098"
JELLIO_SHIM_UPSTREAM = "${JELLYFIN_INTERNAL_URL}"
