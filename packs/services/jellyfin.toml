name = "jellyfin"
container_type = "docker"
group_add = ["render"]
devices = ["/dev/dri:/dev/dri"]

[image]
name = "lscr.io/linuxserver/jellyfin"
tag = "latest"

[settings]
network_mode = "host"

[volumes]
mounts = ["${STORAGE_PATH}:/data", "${CONFIG_PATH}/jellyfin:/config"]

[ui]
enabled = true
port = 8097
path = "/"
name = "Jellyfin"
description = "Media server (no-login LAN/Tailscale endpoint)"
