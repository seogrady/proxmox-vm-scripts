<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Media Stack</title>
  <style>
    :root { color-scheme: dark light; }
    body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; line-height: 1.5; }
    h1 { margin: 0 0 1rem; }
    ul { list-style: none; padding: 0; margin: 0; }
    li { margin: .75rem 0; padding: .75rem; border: 1px solid #8884; border-radius: 8px; }
    a { font-weight: 600; text-decoration: none; }
    p { margin: .25rem 0 0; color: #666; }
  </style>
</head>
<body>
  <h1>Media Stack</h1>
  <ul>
    <li>
      <a href="#" data-service-port="8096">Jellyfin</a>
      <p>Media server</p>
    </li>
    <li>
      <a href="#" data-service-port="8989">Sonarr</a>
      <p>TV automation</p>
    </li>
    <li>
      <a href="#" data-service-port="7878">Radarr</a>
      <p>Movie automation</p>
    </li>
    <li>
      <a href="#" data-service-port="9696">Prowlarr</a>
      <p>Indexer manager</p>
    </li>
    <li>
      <a href="#" data-service-port="8080">qBittorrent</a>
      <p>Torrent client</p>
    </li>
  </ul>
  <script>
    (function () {
      var host = window.location.hostname;
      var links = document.querySelectorAll("a[data-service-port]");
      links.forEach(function (link) {
        var port = link.getAttribute("data-service-port");
        if (!port) return;
        link.href = "http://" + host + ":" + port + "/";
      });
    })();
  </script>
</body>
</html>
