name = "gitea-runner"
version = "1.0.0"
scope = "resource"
targets = ["lxc", "vm"]

[runtime]
requirements = ["docker", "git", "curl", "systemd"]
services = ["act-runner"]

[dependencies]
requires = []
optional = []

[container]
container_type = "systemd"

[settings]
default_target = "lxc"
fallback_target = "vm"
state_root = "/var/lib/act_runner"
config_root = "/etc/act_runner"

[ui]
enabled = false
