name = "gitea"
version = "1.0.0"
scope = "resource"
targets = ["lxc", "vm"]

[runtime]
requirements = ["http", "ssh"]
services = ["gitea"]

[dependencies]
requires = []
optional = []

[container]
container_type = "systemd"

[settings]
default_target = "lxc"
fallback_target = "vm"
http_port = 3000
ssh_port = 2222
repo_root = "/var/lib/gitea/repositories"
data_root = "/var/lib/gitea"

[ui]
enabled = true
port = 3000
path = "/"
name = "Gitea"
description = "Self-hosted Git service"
